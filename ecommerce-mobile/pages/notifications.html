<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>消息通知 - 潮流好物</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/main.css">
  <link rel="stylesheet" href="./notifications.css">
</head>
<body class="page-transition">
  <div class="notif-page">
    <div class="notif-header">
      <div class="notif-header-inner">
        <div class="back-btn" onclick="window.history.back()">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        </div>
        <div class="notif-title">消息通知</div>
      </div>
      <div class="content-tabs" id="notifTabs">
        <div class="content-tab active" data-tab="all">全部 <span class="notif-badge">3</span></div>
        <div class="content-tab" data-tab="order">订单</div>
        <div class="content-tab" data-tab="promo">优惠</div>
        <div class="content-tab" data-tab="sys">系统</div>
      </div>
    </div>

    <div class="notif-body">
      <div class="notif-list" id="notifList"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module" src="./js/pages/notifications.js"></script>
</body>
</html>
