<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>浏览足迹 - 潮流好物</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/main.css">
  <link rel="stylesheet" href="./history.css">
</head>
<body class="page-transition">
  <div class="history-page">
    <div class="history-header">
      <div class="history-header-inner">
        <div class="back-btn" onclick="window.history.back()">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        </div>
        <div class="history-title">浏览足迹</div>
        <div class="history-clear" id="clearBtn">清空</div>
      </div>
    </div>

    <div class="history-body">
      <div class="history-list" id="historyList">
        <!-- Skeleton Loading -->
        <div class="history-skeleton" id="historySkeleton">
          <div class="skeleton-history-item"></div>
          <div class="skeleton-history-item"></div>
          <div class="skeleton-history-item"></div>
          <div class="skeleton-history-item"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module" src="./js/pages/history.js"></script>
</body>
</html>
