<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>确认订单 - 潮流好物</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/main.css">
  <link rel="stylesheet" href="./checkout.css">
</head>
<body class="page-transition">
  <div class="checkout-page" id="checkoutPage">
    <div class="checkout-header">
      <div class="checkout-header-inner">
        <div class="back-btn" onclick="window.history.back()">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></svg>
        </div>
        <div class="checkout-title">确认订单</div>
      </div>
    </div>

    <div class="checkout-body" id="checkoutBody"></div>
  </div>

  <!-- Sheet Overlay -->
  <div class="sheet-overlay" id="sheetOverlay" onclick="closeSheet()"></div>

  <!-- Address Sheet -->
  <div class="sheet-modal" id="addressSheet">
    <div class="sheet-header">
      <span class="sheet-title">选择收货地址</span>
      <div class="sheet-close" onclick="closeSheet()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></svg>
      </div>
    </div>
    <div class="sheet-body">
      <div class="addr-list" id="addrList"></div>
    </div>
  </div>

  <!-- Coupon Sheet -->
  <div class="sheet-modal" id="couponSheet">
    <div class="sheet-header">
      <span class="sheet-title">选择优惠券</span>
      <div class="sheet-close" onclick="closeSheet()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></svg>
      </div>
    </div>
    <div class="sheet-body">
      <div class="coupon-list" id="couponList"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module" src="./js/pages/checkout.js"></script>
</body>
</html>
