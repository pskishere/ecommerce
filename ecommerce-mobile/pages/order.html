<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>我的订单 - 潮流好物</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/main.css">
  <link rel="stylesheet" href="./order.css">
</head>
<body class="page-transition">
  <div class="order-page">
    <div class="order-header">
      <div class="order-header-inner">
        <div class="back-btn" onclick="window.history.back()">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        </div>
        <div class="order-title">我的订单</div>
      </div>
      <div class="content-tabs" id="orderTabs">
        <div class="content-tab active" data-tab="all">全部</div>
        <div class="content-tab" data-tab="pending">待付款</div>
        <div class="content-tab" data-tab="paid">待发货</div>
        <div class="content-tab" data-tab="shipped">待收货</div>
        <div class="content-tab" data-tab="completed">已完成</div>
      </div>
    </div>

    <div class="order-body" id="orderBody">
      <div class="order-list" id="orderList">
        <!-- Skeleton Loading -->
        <div class="order-skeleton" id="orderSkeleton">
          <div class="skeleton-card">
            <div class="skeleton-card-header"></div>
            <div class="skeleton-card-body">
              <div class="skeleton-product"></div>
              <div class="skeleton-product"></div>
            </div>
            <div class="skeleton-card-footer"></div>
          </div>
          <div class="skeleton-card">
            <div class="skeleton-card-header"></div>
            <div class="skeleton-card-body">
              <div class="skeleton-product"></div>
            </div>
            <div class="skeleton-card-footer"></div>
          </div>
          <div class="skeleton-card">
            <div class="skeleton-card-header"></div>
            <div class="skeleton-card-body">
              <div class="skeleton-product"></div>
              <div class="skeleton-product"></div>
            </div>
            <div class="skeleton-card-footer"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module" src="./js/pages/order.js"></script>
</body>
</html>
