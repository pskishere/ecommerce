<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>我的 - 潮流好物</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/main.css">

<body class="page-transition">

  <div class="profile-page active">
    <!-- User Header -->
    <div class="user-header" id="userHeader">
      <!-- Logged in state -->
      <a href="profile-info.html" class="user-card" id="userCard" style="display:none">
        <div class="user-avatar" id="userAvatar">
          <img src="https://picsum.photos/200/200?random=100" alt="头像">
        </div>
        <div class="user-info">
          <div class="user-name-row">
            <span class="user-name" id="userName">林小琳</span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></svg>
          </div>
          <div class="user-id" id="userId">ID: 88888888</div>
          <div class="user-stats">
            <div class="user-stat">
              <span class="user-stat-num" id="followCount">128</span>
              <span class="user-stat-label">关注</span>
            </div>
            <div class="user-stat">
              <span class="user-stat-num" id="fansCount">356</span>
              <span class="user-stat-label">粉丝</span>
            </div>
            <div class="user-stat">
              <span class="user-stat-num" id="pointsCount">2,860</span>
              <span class="user-stat-label">积分</span>
            </div>
          </div>
        </div>
      </a>

      <!-- Logged out state -->
      <div class="user-card" id="loginCard">
        <div class="user-avatar">
          <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=guest&backgroundColor=b6e3f4" alt="头像">
        </div>
        <div class="user-info">
          <div class="user-name-row">
            <span class="user-name">未登录</span>
          </div>
          <div class="user-id">登录后享受更多服务</div>
        </div>
        <a href="login.html" class="login-btn-small">登录</a>
      </div>
    </div>

    <!-- Member Banner -->
    <a href="vip.html" class="member-banner">
      <div class="member-banner-inner">
        <div class="member-banner-left">
          <div class="member-crown">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></svg>
          </div>
          <div class="member-banner-text">
            <span class="member-banner-title" id="memberTitle">黄金会员 · 有效期至 2027.03</span>
            <span class="member-banner-sub">每月领取专属优惠券包 · 专享价商品 · 生日礼包</span>
          </div>
        </div>
        <button class="member-banner-cta" onclick="event.preventDefault();location.href='vip.html'">续费</button>
      </div>
    </a>

    <!-- Body -->
    <div class="profile-body">
      <!-- Orders -->

        <div class="card-header">
          <span class="card-title">我的订单</span>
          <a href="order.html" class="card-more">全部订单 ></a>
        </div>
        <div class="order-grid">
          <a href="order.html?tab=pending" class="order-item">
            <div class="order-icon-wrap" style="color:#FF6B4A;">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></svg>

          </a>

            <div class="order-icon-wrap" style="color:#FF6B4A;">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg></svg>

              <span class="order-badge" id="shippedBadge" style="display:none">1</span>
            </div>
            <span class="order-label">待收货</span>
          </a>
          <a href="order.html?tab=review" class="order-item">
            <div class="order-icon-wrap" style="color:#FF6B4A;">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></svg>
            </div>
            <span class="order-label">待评价</span>

            <div class="order-icon-wrap" style="color:#FF6B4A;">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg></svg>
            </div>
            <span class="order-label">退款/售后</span>
          </a>
        </div>
      </div>

      <!-- Assets -->

        <div class="asset-item">

        <div class="asset-item">
          <span class="asset-num">0</span>

        <div class="asset-item">
          <span class="asset-num">0</span>

        <div class="card-header">
          <span class="card-title">常用服务</span>
        </div>
        <div class="service-grid">
          <a href="favorites.html" class="service-item">

            </div>

          <a href="history.html" class="service-item">

            </div>
            <span class="service-label">浏览足迹</span>
          </a>
          <a href="address.html" class="service-item">
            <div class="service-icon" style="background:#F3E5F5;color:#7C4DFF;">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></svg>
            </div>
            <span class="service-label">地址管理</span>
          </a>
          <a href="notifications.html" class="service-item">
            <div class="service-icon" style="background:#FFEBEE;color:#E91E63;">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></svg>
            </div>

            </div>

      <!-- Invite Banner -->

    <a href="category.html" class="tab-item" aria-label="分类">
