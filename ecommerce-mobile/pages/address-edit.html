<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>编辑地址 - 潮流好物</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/main.css">
  <link rel="stylesheet" href="./address-edit.css">
</head>
<body class="page-transition">
  <div class="edit-page">
    <div class="edit-header">
      <div class="edit-header-inner">
        <div class="back-btn" onclick="window.history.back()">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        </div>
        <div class="edit-title" id="pageTitle">编辑地址</div>
      </div>
    </div>

    <div class="edit-body">
      <div class="edit-form">
        <div class="form-row">
          <span class="form-label">收货人</span>
          <input type="text" class="form-input" id="nameInput" placeholder="请输入收货人姓名" maxlength="20">
        </div>
        <div class="form-row">
          <span class="form-label">手机号</span>
          <input type="tel" class="form-input" id="phoneInput" placeholder="请输入手机号" maxlength="11">
        </div>
        <div class="form-row" style="flex-direction:column;align-items:stretch;gap:8px">
          <div style="display:flex;gap:8px">
            <div class="form-select-wrap">
              <select id="provinceSelect">
                <option value="">请选择省</option>
              </select>
            </div>
            <div class="form-select-wrap">
              <select id="citySelect" disabled>
                <option value="">请选择市</option>
              </select>
            </div>
            <div class="form-select-wrap">
              <select id="districtSelect" disabled>
                <option value="">请选择区</option>
              </select>
            </div>
          </div>
        </div>
        <div class="form-row">
          <span class="form-label">详细地址</span>
          <textarea class="form-textarea" id="detailInput" rows="2" placeholder="请输入详细地址，如街道、门牌号等"></textarea>
        </div>
      </div>

      <div class="form-default-row">
        <div>
          <div class="form-default-text">设为默认地址</div>
          <div class="form-default-sub">便捷下单，首个默认</div>
        </div>
        <div class="toggle-switch" id="defaultSwitch" onclick="toggleDefault()"></div>
      </div>
    </div>

    <div class="edit-bar">
      <button class="edit-bar-btn" id="saveBtn" onclick="saveAddress()">保存地址</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module" src="./js/pages/address-edit.js"></script>
</body>
</html>
