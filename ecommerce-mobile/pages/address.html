<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>地址管理 - 潮流好物</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/main.css">
  <link rel="stylesheet" href="./address.css">
</head>
<body class="page-transition">
  <div class="address-page">
    <div class="address-header">
      <div class="address-header-inner">
        <div class="back-btn" onclick="window.history.back()">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        </div>
        <div class="address-title">地址管理</div>
      </div>
    </div>

    <div class="address-body">
      <div class="address-list" id="addressList"></div>
      <button class="address-add-card" onclick="location.href='address-edit.html'">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        新增地址
      </button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module" src="./js/pages/address.js"></script>
</body>
</html>
