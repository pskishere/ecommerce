<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>购物车 - 潮流好物</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/main.css">
  <link rel="stylesheet" href="./cart.css">
</head>
<body class="page-transition">

  <div class="cart-page">
    <!-- Header -->
    <div class="cart-header">
      <span class="cart-title">购物车</span>
      <span class="cart-edit-btn" id="editBtn">编辑</span>
    </div>

    <!-- Content -->
    <div class="cart-content" id="cartContent">
      <!-- Skeleton Loading -->
      <div class="cart-skeleton" id="cartSkeleton">
        <div class="skeleton-store">
          <div class="skeleton-store-header"></div>
          <div class="skeleton-product-row"></div>
          <div class="skeleton-product-row"></div>
        </div>
        <div class="cart-skeleton-spacer"></div>
      </div>
    </div>

    <!-- Recommend Section -->
    <div class="recommend-section" id="recommendSection"></div>

    <!-- Checkout Bar -->
    <div class="cart-bar" id="cartBar">
      <div class="bar-select-all" id="selectAll">
        <div class="bar-check" id="selectAllCheck"></div>
        <span class="bar-select-text">全选</span>
      </div>
      <div class="bar-total">
        <span class="total-price" id="totalPrice">¥0</span>
        <span class="total-disount" id="totalDiscount"></span>
      </div>
      <button class="checkout-btn" id="checkoutBtn">结算(<span id="checkoutCount">0</span>)</button>
    </div>

    <!-- Edit Mode Bar -->
    <div class="cart-bar edit-mode" id="editBar" style="display:none">
      <div class="bar-select-all" id="selectAllEdit">
        <div class="bar-check" id="selectAllCheckEdit"></div>
        <span class="bar-select-text">全选</span>
      </div>
      <div style="flex:1"></div>
      <button class="delete-btn" id="deleteBtn">删除</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- Bottom Tab Bar -->
  <nav class="tab-bar" id="tabBar">
    <a href="index.html" class="tab-item" aria-label="首页">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></svg>
      <span>首页</span>
    </a>
    <a href="category.html" class="tab-item" aria-label="分类">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg></svg>
      <span>分类</span>
    </a>
    <a href="cart.html" class="tab-item active" aria-label="购物车">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg></svg>
      <span>购物车</span>
      <span class="tab-badge" id="tabCartBadge"></span>
    </a>
    <a href="profile.html" class="tab-item" aria-label="我的">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></svg>
      <span>我的</span>
    </a>
  </nav>

  <script type="module" src="./js/pages/cart.js"></script>
</body>
</html>
