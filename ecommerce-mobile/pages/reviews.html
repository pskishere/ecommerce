<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>全部评价 - 潮流好物</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/main.css">
  <link rel="stylesheet" href="./reviews.css">
</head>
<body class="page-transition">
  <div class="reviews-page">
    <div class="reviews-header">
      <div class="reviews-header-inner">
        <div class="back-btn" onclick="window.history.back()">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        </div>
        <div class="reviews-title">全部评价</div>
      </div>
      <div class="reviews-summary">
        <div class="summary-score">
          <div class="summary-score-num">4.8</div>
          <div class="summary-score-text">综合评分</div>
        </div>
        <div class="summary-tags">
          <span class="summary-tag active">全部(128)</span>
          <span class="summary-tag">好评(110)</span>
          <span class="summary-tag">中评(12)</span>
          <span class="summary-tag">差评(6)</span>
          <span class="summary-tag">有图(45)</span>
        </div>
      </div>
      <div class="content-tabs" id="reviewsTabs">
        <div class="content-tab active" data-tab="all">全部</div>
        <div class="content-tab" data-tab="5">5星</div>
        <div class="content-tab" data-tab="4">4星</div>
        <div class="content-tab" data-tab="3">3星</div>
        <div class="content-tab" data-tab="12">1-2星</div>
      </div>
    </div>

    <div class="reviews-body">
      <div class="reviews-list" id="reviewsList">
        <!-- Skeleton Loading -->
        <div class="reviews-skeleton" id="reviewsSkeleton">
          <div class="skeleton-review"></div>
          <div class="skeleton-review"></div>
          <div class="skeleton-review"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module" src="./js/pages/reviews.js"></script>
</body>
</html>
