<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>店铺详情 - 潮流好物</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/main.css">
  <link rel="stylesheet" href="./shop.css">
</head>
<body class="page-transition">
  <div class="shop-page">
    <!-- Header -->
    <div class="shop-header">
      <div class="shop-banner">
        <img src="./assets/images/banner-1-summer-1710.webp" alt="">
      </div>
      <div class="shop-info-row">
        <div class="shop-logo">
          <img src="./assets/images/product-01-watch.webp" alt="">
        </div>
        <div class="shop-meta">
          <div class="shop-name" id="shopName">潮流优品官方旗舰店</div>
          <div class="shop-desc" id="shopDesc">专注品质生活，提供高性价比优质商品，正品保障</div>
          <div class="shop-tags">
            <span class="shop-tag">品质保证</span>
            <span class="shop-tag">正品保障</span>
            <span class="shop-tag">极速发货</span>
          </div>
        </div>
      </div>
      <div class="shop-stats">
        <div class="shop-stat">
          <div class="shop-stat-num" id="statScore">4.9</div>
          <div class="shop-stat-label">评分</div>
        </div>
        <div class="shop-stat">
          <div class="shop-stat-num" id="statProducts">286</div>
          <div class="shop-stat-label">商品</div>
        </div>
        <div class="shop-stat">
          <div class="shop-stat-num" id="statSales">12.8万</div>
          <div class="shop-stat-label">销量</div>
        </div>
        <div class="shop-stat">
          <div class="shop-stat-num" id="statFans">56.2万</div>
          <div class="shop-stat-label">粉丝</div>
        </div>
      </div>
      <div class="shop-action-bar">
        <button class="shop-action-btn primary" id="followBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          关注
        </button>
        <button class="shop-action-btn secondary" onclick="shareShop()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
          分享
        </button>
      </div>
    </div>

    <!-- Tabs -->
    <div class="content-tabs" id="shopTabs">
      <div class="content-tab active" data-tab="products">全部商品</div>
      <div class="content-tab" data-tab="new">新品上架</div>
      <div class="content-tab" data-tab="hot">热卖宝贝</div>
    </div>

    <!-- Content -->
    <div class="shop-content" id="shopContent"></div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script type="module" src="./js/pages/shop.js"></script>
</body>
</html>
