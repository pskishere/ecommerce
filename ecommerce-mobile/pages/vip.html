<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>会员中心 - 潮流好物</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/main.css">
  <link rel="stylesheet" href="./vip.css">
</head>
<body class="page-transition">
  <div class="vip-page">
    <div class="vip-header">
      <div class="vip-header-inner">
        <div class="back-btn" onclick="window.history.back()">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        </div>
        <div class="vip-title">会员中心</div>
      </div>
    </div>

    <div class="vip-body">
      <div class="vip-banner">
        <div class="vip-user">
          <div class="vip-avatar">
            <img src="https://ui-avatars.com/api/?name=%E6%9E%97%E5%B0%8F%E7%90%B3&background=FF6B4A&color=fff&size=128" alt="头像">
          </div>
          <div class="vip-user-info">
            <div class="vip-user-name">
              林小琳
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
            </div>
            <div class="vip-level">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
              VIP会员
            </div>
            <div class="vip-expire">有效期至 2027-03-27</div>
          </div>
        </div>
        <div class="vip-points">
          <div class="vip-points-item">
            <div class="vip-points-num">8,888</div>
            <div class="vip-points-text">可用积分</div>
          </div>
          <div class="vip-points-divider"></div>
          <div class="vip-points-item">
            <div class="vip-points-num">200</div>
            <div class="vip-points-text">本月成长值</div>
          </div>
        </div>
      </div>

      <div class="vip-benefits">
        <div class="vip-benefits-title">会员专享权益</div>
        <div class="benefits-grid">
          <div class="benefit-item">
            <div class="benefit-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
            </div>
            <div class="benefit-name">专享券</div>
          </div>
          <div class="benefit-item">
            <div class="benefit-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
            </div>
            <div class="benefit-name">免费配送</div>
          </div>
          <div class="benefit-item">
            <div class="benefit-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            </div>
            <div class="benefit-name">专属客服</div>
          </div>
          <div class="benefit-item">
            <div class="benefit-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><line x1="12" y1="22" x2="12" y2="7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg>
            </div>
            <div class="benefit-name">生日礼包</div>
          </div>
        </div>
      </div>

      <div class="privilege-section">
        <div class="privilege-item">
          <div class="privilege-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
          </div>
          <div class="privilege-text">
            <div class="privilege-name">专享优惠券</div>
            <div class="privilege-desc">每月4张专属优惠券</div>
          </div>
          <div class="privilege-value">领取</div>
        </div>
        <div class="privilege-item">
          <div class="privilege-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          </div>
          <div class="privilege-text">
            <div class="privilege-name">专享价商品</div>
            <div class="privilege-desc">会员专属低价</div>
          </div>
          <div class="privilege-value">查看</div>
        </div>
      </div>

      <div class="vip-history">
        <div class="vip-history-title">积分明细</div>
        <div class="history-list">
          <div class="history-item">
            <div class="history-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
            </div>
            <div class="history-info">
              <div class="history-name">购物赠送</div>
              <div class="history-time">2026-03-27 14:30</div>
            </div>
            <div class="history-points">+200</div>
          </div>
          <div class="history-item">
            <div class="history-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><line x1="12" y1="22" x2="12" y2="7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg>
            </div>
            <div class="history-info">
              <div class="history-name">积分兑换优惠券</div>
              <div class="history-time">2026-03-26 10:15</div>
            </div>
            <div class="history-points negative">-100</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module" src="./js/pages/vip.js"></script>
</body>
</html>
