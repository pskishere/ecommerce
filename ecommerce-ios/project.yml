name: ecommerce-ios
options:
  bundleIdPrefix: com.pskishere
  deploymentTarget:
    iOS: "26.2"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"

targets:
  ecommerce-ios:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pskishere.rcommerce
        INFOPLIST_KEY_CFBundleDisplayName: "潮流好物"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSCameraUsageDescription: "用于拍摄商品照片和扫码"
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "用于选择商品图片和上传照片"
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: "用于保存商品图片到相册"
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "用于获取收货地址位置信息"
        INFOPLIST_KEY_NSUserNotificationsUsageDescription: "用于接收订单状态和优惠信息通知"
